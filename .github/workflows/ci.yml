name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l $(find . -type f -name '*.go' -not -path './.git/*'))
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Build
        run: go build ./...

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: test-and-build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install nats-server
        run: |
          go install github.com/nats-io/nats-server/v2@v2.10.22
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Make scripts executable
        run: chmod +x tests/smoke/*.sh

      - name: Validate config script
        run: ./tests/smoke/validate-config.sh

      - name: Mocked integration tests
        timeout-minutes: 5
        run: go test -tags=integration ./...

      - name: Real-NATS configure smoke
        timeout-minutes: 5
        run: NATS_PORT=4223 ./tests/smoke/real-nats-configure-smoke.sh

      - name: Real-NATS action smoke
        timeout-minutes: 5
        run: NATS_PORT=4224 ./tests/smoke/real-nats-action-smoke.sh
